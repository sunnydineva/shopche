# Server configuration
server.port=8080
server.servlet.context-path=/

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/online_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:shop_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shop_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.time-zone=UTC

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Ensure Flyway runs after database initialization
spring.flyway.baseline-version=0

# JWT configuration
jwt.secret=${JWT_SECRET:?JWT_SECRET must be set}
jwt.expiration=86400000

# Logging
logging.level.org.springframework=ERROR
logging.level.com.shop=ERROR
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR

## Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://schema-registry:8081}
## producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

## consumer (????? ?????? ?? ????)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.specific.avro.reader=true
spring.kafka.consumer.group-id=order-log-service

# Category Service Configuration
category-service.url=http://category-service:8083

# Product Service Configuration
product-service.url=http://product-service:8084

# Order Service Configuration
order-service.url=http://category-service:8085

# AI Service Configuration
ai-service.url=http://ai-service:8081

# Feign Client Configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000
feign.client.config.ai-service.connect-timeout=5000
feign.client.config.ai-service.read-timeout=30000

# OpenTelemetry Configuration
spring.application.name=online-shop-backend
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.prometheus.metrics.export.enabled=true

# Tracing Configuration
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
management.otlp.tracing.headers.authorization=${OTEL_EXPORTER_OTLP_HEADERS:}

# OpenTelemetry Resource Attributes
otel.service.name=online-shop-backend
otel.service.version=0.0.1-SNAPSHOT
otel.resource.attributes=service.name=online-shop-backend,service.version=0.0.1-SNAPSHOT,deployment.environment=${DEPLOYMENT_ENVIRONMENT:development}
