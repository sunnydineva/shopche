# Server configuration
server.port=8082
server.servlet.context-path=/

# Logging
logging.level.org.springframework=INFO
logging.level.com.shop=INFO
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=INFO

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://schema-registry:8081}

# consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.specific.avro.reader=true
spring.kafka.consumer.group-id=order-log-service
spring.kafka.consumer.auto-offset-reset=latest

# Email configuration (using Gmail as an example)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# For development/testing, you can use a fake SMTP server like MailHog
# spring.mail.host=mailhog
# spring.mail.port=1025
